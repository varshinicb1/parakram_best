user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;
    
    # Optional Rate Limiting to prevent intent parsing DDOS
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream parakram_backend {
        server backend:8400;
    }

    server {
        listen 80;
        server_name api.parakram.com; # Replace with your domain!

        # Redirect HTTP to HTTPS in production
        # return 301 https://$host$request_uri;
        
        # Fast location for Let's Encrypt validation
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://parakram_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # server {
    #     listen 443 ssl;
    #     server_name api.parakram.com;
    #     
    #     ssl_certificate /etc/letsencrypt/live/api.parakram.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/api.parakram.com/privkey.pem;
    #     
    #     location / {
    #         proxy_pass http://parakram_backend;
    #         proxy_set_header Host $host;
    #     }
    # }
}
