apiVersion: apps/v1
kind: Deployment
metadata:
  name: parakram-backend
  namespace: parakram
  labels:
    app: parakram
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: parakram
      component: backend
  template:
    metadata:
      labels:
        app: parakram
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/api/system/metrics"
        prometheus.io/port:   "8400"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/vidyuthlabs/parakram-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8400
              protocol: TCP
          envFrom:
            - secretRef:
                name: parakram-secrets
          env:
            - name: RUST_LOG
              value: "parakram_backend=info,tower_http=info"
            - name: BIND_ADDR
              value: "0.0.0.0:8400"
          livenessProbe:
            httpGet:
              path: /api/system/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/system/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: parakram
              component: backend
