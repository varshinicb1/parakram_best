; PlatformIO project configuration — Parakram Arduino port
; Usage: pio run -e <environment>

[env]
build_flags =
    -DPARAKRAM_TARGET_MCU_ARDUINO=1
    -DPARAKRAM_VERSION_MAJOR=1
    -DPARAKRAM_VERSION_MINOR=0
    -I../../hal/include
    -I../../main/include
    -I../../main/drivers

lib_extra_dirs =
    ../../hal/arduino
    ../../hal/common
    ../../main/runtime
    ../../main/drivers
    ../../main/safety

; ── ESP32 ──────────────────────────────────────────────────────────────────
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed  = 921600

; ── RP2040 (Raspberry Pi Pico) ─────────────────────────────────────────────
[env:pico]
platform  = raspberrypi
board     = pico
framework = arduino
monitor_speed = 115200

; ── Arduino Mega ───────────────────────────────────────────────────────────
[env:mega2560]
platform  = atmelavr
board     = megaatmega2560
framework = arduino
monitor_speed = 115200
build_flags = ${env.build_flags} -DARDUINO_AVR_MEGA2560

; ── STM32 Nucleo-F401RE ────────────────────────────────────────────────────
[env:nucleo_f401re]
platform  = ststm32
board     = nucleo_f401re
framework = arduino
monitor_speed = 115200
