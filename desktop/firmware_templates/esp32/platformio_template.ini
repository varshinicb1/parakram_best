; Parakram AI — PlatformIO Configuration Template
; Auto-generated for ESP32 + Arduino framework

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Library dependencies (auto-populated from block definitions)
lib_deps =
{{LIB_DEPS}}

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1

; Monitor filters
monitor_filters = 
    esp32_exception_decoder
