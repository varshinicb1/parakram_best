<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D9FF"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.85"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Subtle inner glow ring -->
  <rect width="1024" height="1024" rx="220" ry="220"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Lightning bolt (Parakram means "prowess/power") -->
  <polygon points="580,100 340,560 510,560 420,920 680,440 510,440 620,100"
           fill="url(#bolt)" filter="url(#glow)"/>
</svg>
