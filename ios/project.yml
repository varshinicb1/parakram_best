name: Parakram
options:
  bundleIdPrefix: com.vidyuthlabs
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  Parakram:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Parakram
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vidyuthlabs.parakram
        INFOPLIST_FILE: Parakram/Info.plist
        DEVELOPMENT_TEAM: ""  # Fill in your Apple Developer Team ID
        CODE_SIGN_STYLE: Automatic
        ENABLE_BITCODE: NO
        SWIFT_OPTIMIZATION_LEVEL: "-O"
      configs:
        debug:
          CODE_SIGN_IDENTITY: "iPhone Developer"
          OTHER_SWIFT_FLAGS: "-DDEBUG"
        release:
          CODE_SIGN_IDENTITY: "iPhone Distribution"
    info:
      path: Parakram/Info.plist
      properties:
        CFBundleDisplayName: Parakram
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSBluetoothAlwaysUsageDescription: "Parakram uses Bluetooth to connect to and program IoT devices."
        NSBluetoothPeripheralUsageDescription: "Parakram uses Bluetooth to connect to and program IoT devices."
        NSLocalNetworkUsageDescription: "Parakram uses local network to discover devices."
        UIBackgroundModes:
          - bluetooth-central
          - bluetooth-peripheral
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Parakram/Parakram.entitlements
      properties:
        aps-environment: production
    scheme:
      testTargets:
        - ParakramTests
      gatherCoverageData: true

  ParakramTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ParakramTests
        optional: true
    dependencies:
      - target: Parakram
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vidyuthlabs.parakramTests
